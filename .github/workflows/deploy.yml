name: Deploy Extension Repository

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile and Bundle Paperback Packages
        run: |
          npm run build
          npm run bundle

      - name: Prepare Deployment Artifacts
        run: |
          cp bundles/dist/versioning.json bundles/dist/index.min.json

      - name: Deploy Compiled Static Files to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: bundles/dist
          branch: repo
          clean: true
